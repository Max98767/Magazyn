<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#1a2332"/>
  <!-- Gear shape -->
  <g transform="translate(256,256)">
    <!-- Outer gear teeth via clip path + circles trick — using polygon for clean gear -->
    <path d="
      M 0,-120
      L 18,-108 L 40,-118 L 50,-98 L 72,-96 L 74,-74 L 94,-62 L 86,-42
      L 100,-24 L 88,-6 L 96,14 L 80,28 L 80,50 L 60,56 L 52,76 L 32,72
      L 18,90 L -2,82 L -18,96 L -36,84 L -54,92 L -64,74 L -84,68
      L -84,46 L -102,34 L -98,12 L -112,-4 L -102,-22 L -108,-42
      L -92,-54 L -94,-76 L -72,-82 L -66,-104 L -44,-102 L -32,-120
      L -10,-114 Z
    " fill="#0077a8" opacity="0.9"/>
    <!-- Inner circle cutout -->
    <circle r="52" fill="#1a2332"/>
    <!-- Inner accent ring -->
    <circle r="52" fill="none" stroke="#0077a8" stroke-width="4" opacity="0.6"/>
    <!-- Center dot -->
    <circle r="14" fill="#0077a8"/>
    <!-- Chip/circuit lines -->
    <line x1="-30" y1="0" x2="-14" y2="0" stroke="#f0f2f5" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="14" y1="0" x2="30" y2="0" stroke="#f0f2f5" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="-30" x2="0" y2="-14" stroke="#f0f2f5" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="14" x2="0" y2="30" stroke="#f0f2f5" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  </g>
  <!-- Bottom text: MAG//SYS -->
  <text x="256" y="446" text-anchor="middle" font-family="monospace" font-size="52" font-weight="bold" fill="#f0f2f5" opacity="0.85" letter-spacing="-1">MAG</text>
  <text x="256" y="490" text-anchor="middle" font-family="monospace" font-size="30" font-weight="500" fill="#0077a8" letter-spacing="2">//SYS</text>
</svg>
